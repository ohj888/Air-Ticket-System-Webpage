<!DOCTYPE html>
<html>
<head>
    <title>Airline Database Management System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
        }

        .hero {
            min-height: 100vh;
            background-image: linear-gradient(
                rgba(0, 0, 0, 0.45),
                rgba(0, 0, 0, 0.45)
            ), url("{{ url_for('static', filename='home.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .navbar {
            height: 60px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 40px;
        }

        .login-button {
            background: #2563eb;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .login-button:hover {
            background: #1d4ed8;
        }

        .main-content {
            text-align: center;
            padding-top: 140px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 35px;
        }

        .links a {
            background: white;
            color: #2563eb;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            background: #e5e7eb;
        }
    </style>
</head>

<body>
    <div class="hero">
        <div class="navbar">
            <a class="login-button" href="{{ url_for('login') }}">Login</a>
        </div>

        <div class="main-content">
            <h1>Welcome to Airline Ticket System</h1>
            <p class="subtitle">Search flights, manage reservations, and access airline data.</p>

            <div class="links">
                <a href="{{ url_for('search_airport') }}">Search Flights</a>
            </div>
        </div>
    </div>
</body>
</html>
