<!DOCTYPE html>
<html>
<head>
    <title>My Purchased Flights</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
        }

        .navbar {
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .navbar a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
            margin-left: 18px;
        }

        .container {
            width: 1150px;
            margin: 50px auto;
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
        }

        .filter-form {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 9px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            background: #2563eb;
            color: white;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .clear-link {
            display: inline-block;
            background: #6b7280;
            color: white;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: #f3f4f6;
        }

        .message {
            color: #6b7280;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <strong>Customer Portal</strong>
        <div>
            <a href="{{ url_for('customer.customer_home') }}">Customer Home</a>
            <a href="{{ url_for('customer.customer_search') }}">Available Flights</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>

    <div class="container">
        <h1>My Purchased Flights</h1>

        <form method="POST" class="filter-form">
            <div>
                <label for="start_date">Start Date</label>
                <input type="date" name="start_date" id="start_date" value="{{ start_date }}">
            </div>

            <div>
                <label for="end_date">End Date</label>
                <input type="date" name="end_date" id="end_date" value="{{ end_date }}">
            </div>

            <div>
                <label for="origin">Origin</label>
                <select name="origin" id="origin">
                    <option value="">Any origin</option>
                    {% for airport in airports %}
                        <option value="{{ airport.airport_name }}"
                            {% if origin == airport.airport_name %}selected{% endif %}>
                            {{ airport.airport_name }} - {{ airport.city }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="destination">Destination</label>
                <select name="destination" id="destination">
                    <option value="">Any destination</option>
                    {% for airport in airports %}
                        <option value="{{ airport.airport_name }}"
                            {% if destination == airport.airport_name %}selected{% endif %}>
                            {{ airport.airport_name }} - {{ airport.city }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>&nbsp;</label>
                <button type="submit">Apply Filters</button>
            </div>
        </form>

        <a class="clear-link" href="{{ url_for('customer.customer_flights') }}">Clear Filters</a>

        {% if rows %}
            <table>
                <tr>
                    {% for col in columns %}
                        <th>{{ col }}</th>
                    {% endfor %}
                </tr>

                {% for row in rows %}
                    <tr>
                        {% for col in columns %}
                            <td>{{ row[col] }}</td>
                        {% endfor %}
                    </tr>
                {% endfor %}
            </table>
        {% else %}
            <p class="message">No purchased flights found.</p>
        {% endif %}
    </div>

</body>
</html>
