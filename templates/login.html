<!DOCTYPE html>
<html>
<head>
    <title>Login | Airline Ticket System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
        }

        .navbar {
            height: 60px;
            background: white;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .navbar a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
            margin-right: 18px;
        }

        .login-box {
            width: 380px;
            margin: 90px auto;
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 28px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            background: #2563eb;
            color: white;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
        }

        .register-link {
            text-align: center;
            margin-top: 18px;
        }

        .register-link a {
            color: #2563eb;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="{{ url_for('index') }}">Back to Home</a>
        <a href="{{ url_for('search_airport') }}">Public Flight Search</a>
    </div>

    <div class="login-box">
        <h1>Login</h1>
        <p class="subtitle">Choose your account type</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <label for="user_type">Login As</label>
            <select name="user_type" id="user_type" required>
                <option value="">Select user type</option>
                <option value="customer">Customer</option>
                <option value="booking_agent">Booking Agent</option>
                <option value="airline_staff">Airline Staff</option>
            </select>

            <label for="username">Email / Username</label>
            <input type="text" name="username" id="username" required>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>

            <button type="submit">Login</button>
        </form>

        <div class="register-link">
            <p>Don't have an account?</p>
            <a href="{{ url_for('register') }}">Register</a>
        </div>
    </div>
</body>
</html>
